<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="mf-m" x1="55" y1="60" x2="200" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f66b0"/>
      <stop offset="1" stop-color="#2ab5ae"/>
    </linearGradient>
  </defs>

  <!-- M : left post, valley, upstroke that meets the F wing -->
  <path d="M57 182 V68 L112 140 L167 68"
        stroke="url(#mf-m)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- F top wing bar -->
  <path d="M167 68 Q180 48 202 48 H332"
        stroke="#2cc2b5" stroke-width="27" stroke-linecap="round" fill="none"/>
  <!-- F middle bar -->
  <path d="M252 100 H324" stroke="#2cc2b5" stroke-width="24" stroke-linecap="round"/>
  <!-- F stem curving down toward the wave -->
  <path d="M250 58 C257 88 253 110 242 126"
        stroke="#2cc2b5" stroke-width="21" stroke-linecap="round" fill="none"/>

  <!-- wave with cursive loop on the left, curl on the right -->
  <path d="M124 152
           C98 132 60 142 60 167
           C60 193 94 200 114 180
           C142 153 168 146 196 160
           C230 177 268 178 296 160
           C308 152 314 142 316 132"
        stroke="#2cc2b5" stroke-width="15" stroke-linecap="round" fill="none"/>

  <!-- people: large centre figure, two smaller either side -->
  <g stroke="#2cc2b5" stroke-width="7" stroke-linecap="round">
    <circle cx="190" cy="116" r="13"/>
    <path d="M171 158 v-9 a19 19 0 0 1 38 0 v9"/>
    <circle cx="156" cy="127" r="8.5"/>
    <path d="M144 156 v-5 a12 12 0 0 1 17 -10"/>
    <circle cx="224" cy="127" r="8.5"/>
    <path d="M219 142 a12 12 0 0 1 17 10 v3"/>
  </g>
</svg>
